<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" aria-labelledby="title desc" role="img" viewBox="0 0 1100 520"><title id="title">Codex 桌面 App 设置入口速查</title><desc id="desc">把 Codex 桌面 App 设置分成基础体验、执行边界和扩展能力三组。</desc><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset=".54" stop-color="#eefcf9"/><stop offset="1" stop-color="#f8fbff"/></linearGradient><filter id="shadow" width="120%" height="130%" x="-10%" y="-12%"><feDropShadow dx="0" dy="12" flood-color="#0f172a" flood-opacity=".1" stdDeviation="16"/></filter></defs><rect width="1100" height="520" fill="url(#bg)" rx="28"/><g><text x="0" y="0" fill="#172033" dominant-baseline="hanging" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="34" font-weight="750" transform="translate(48 42)">设置先分三层看</text><text x="0" y="52" fill="#64748b" dominant-baseline="hanging" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" transform="translate(48 42)">先把体验调顺，再设安全边界，最后按任务接入外部工具。</text></g><g filter="url(#shadow)" transform="translate(48 142)"><rect width="310" height="300" fill="#fff" rx="18"/><circle cx="38" cy="42" r="15" fill="#14b8a6"/><text x="66" y="31" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="750">基础体验</text><text x="28" y="78" fill="#64748b" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16">让界面、语气和默认行为适合你。</text><g fill="#0f766e" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="650"><rect width="118" height="38" x="28" y="118" fill="#ccfbf1" rx="19"/><text x="58" y="143">常规</text><rect width="118" height="38" x="160" y="118" fill="#ccfbf1" rx="19"/><text x="190" y="143">外观</text><rect width="118" height="38" x="28" y="172" fill="#ccfbf1" rx="19"/><text x="48" y="197">个性化</text><rect width="118" height="38" x="160" y="172" fill="#ccfbf1" rx="19"/><text x="190" y="197">归档</text></g><text x="28" y="244" fill="#475569" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15">新手建议：先保持默认，只改外观、</text><text x="28" y="268" fill="#475569" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15">通知和个性化语气。</text></g><g filter="url(#shadow)" transform="translate(395 142)"><rect width="310" height="300" fill="#fff" rx="18"/><circle cx="38" cy="42" r="15" fill="#2563eb"/><text x="66" y="31" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="750">执行边界</text><text x="28" y="78" fill="#64748b" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16">决定 Codex 能改哪里、跑什么、怎么并行。</text><g fill="#1d4ed8" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="650"><rect width="118" height="38" x="28" y="118" fill="#dbeafe" rx="19"/><text x="58" y="143">配置</text><rect width="118" height="38" x="160" y="118" fill="#dbeafe" rx="19"/><text x="200" y="143">Git</text><rect width="118" height="38" x="28" y="172" fill="#dbeafe" rx="19"/><text x="58" y="197">环境</text><rect width="118" height="38" x="160" y="172" fill="#dbeafe" rx="19"/><text x="190" y="197">工作树</text><rect width="118" height="38" x="28" y="226" fill="#dbeafe" rx="19"/><text x="48" y="251">使用情况</text></g></g><g filter="url(#shadow)" transform="translate(742 142)"><rect width="310" height="300" fill="#fff" rx="18"/><circle cx="38" cy="42" r="15" fill="#d97706"/><text x="66" y="31" fill="#172033" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="750">扩展能力</text><text x="28" y="78" fill="#64748b" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16">让 Codex 连接工具、浏览器和桌面应用。</text><g fill="#b45309" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="650"><rect width="118" height="38" x="28" y="118" fill="#fef3c7" rx="19"/><text x="50" y="143">MCP</text><rect width="118" height="38" x="160" y="118" fill="#fef3c7" rx="19"/><text x="198" y="143">钩子</text><rect width="118" height="38" x="28" y="172" fill="#fef3c7" rx="19"/><text x="58" y="197">浏览器</text><rect width="118" height="38" x="160" y="172" fill="#fef3c7" rx="19"/><text x="180" y="197">电脑操控</text></g><text x="28" y="244" fill="#475569" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15">先开最小权限；涉及账号、文件和</text><text x="28" y="268" fill="#475569" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15">浏览器操作时逐次审批。</text></g></svg>